name: Fetch latest blog post

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Runs a single command using the runners shell
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install curl pipx jq
          pipx install yq jinja2-cli

      - name: Fetch latest blog post from RSS feed
        run: |
          item="$(curl -s https://joaocosta.dev/rss | xq -r '.rss.channel.item[0]')"
          echo $item
          parsed_item="$(echo "$item" | jq -r '{title: .title, summary: .description, url: .link}')"
          echo "$parsed_item" | jinja2 README.j2 --format=json >README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update latest blog post"
          git push
